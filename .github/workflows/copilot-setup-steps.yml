name: "Copilot Setup Steps"

# Run automatically when this file changes, and allow manual dispatch for validation.
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Check out the repository
        uses: actions/checkout@v6.0.2

      - name: Set up PHP
        uses: shivammathur/setup-php@2.37.0
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none

      # Pre-install all Composer dependencies before the agent firewall is enabled.
      # This prevents "Firewall rules blocked" errors during composer install inside the agent.
      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist
